# fly.toml app configuration file for the chungus-battles-backend DEV environment
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chungus-battles-backend-dev'
primary_region = 'waw'

[build]

[env]
  NODE_ENV = 'development'

[http_service]
  internal_port = 2567
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
